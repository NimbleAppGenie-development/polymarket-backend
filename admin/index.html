<script>
    function loadScript(src, callback) {
        let id = 'kaiadmin-jquery-script';

        document.getElementById(id) && document.body.removeChild(document.getElementById(id));

        const script = document.createElement("script");
        script.src = src;
        script.async = true;
        script.id = id;
        script.onload = callback; // Execute callback when script is loaded
        document.body.appendChild(script);
    }

    const delay = 1000;

    setTimeout(() => {
        loadScript("/js/kaiadmin.js", () => {
            // Use jQuery after it loads
            $(document).ready(() => {
                console.log('script loaded')
            });
        });

        console.log("jQuery loading initiated");
    }, delay);

    window.addEventListener('js-load-kro-jaldi', () => {
        loadScript("/js/kaiadmin.js", () => { });
    })

</script>
